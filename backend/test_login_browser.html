<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Login Test for Patent Analytics Platform</h1>
    
    <div class="form-group">
        <label>API URL:</label>
        <input type="text" id="apiUrl" value="http://192.168.29.81:8000/api/v1/accounts/auth/login/" readonly>
    </div>
    
    <div class="form-group">
        <label>Username:</label>
        <input type="text" id="username" value="admin">
    </div>
    
    <div class="form-group">
        <label>Password:</label>
        <input type="password" id="password" value="admin123">
    </div>
    
    <button onclick="testLogin()">Test Login</button>
    <button onclick="saveToLocalStorage()">Save Tokens to LocalStorage</button>
    
    <div id="result"></div>
    
    <script>
        let tokens = null;
        
        async function testLogin() {
            const apiUrl = document.getElementById('apiUrl').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = 'Testing login...';
            
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    tokens = data.tokens;
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <h3>✓ Login Successful!</h3>
                        <p><strong>User:</strong> ${data.user.email}</p>
                        <p><strong>Role:</strong> ${data.user.role}</p>
                        <p><strong>Access Token:</strong> ${data.tokens.accessToken.substring(0, 50)}...</p>
                        <p><strong>Refresh Token:</strong> ${data.tokens.refreshToken.substring(0, 50)}...</p>
                        <hr>
                        <p>Now click "Save Tokens to LocalStorage" and then navigate to the dashboard.</p>
                    `;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `
                        <h3>✗ Login Failed</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `
                    <h3>✗ Error</h3>
                    <p>${error.message}</p>
                `;
            }
        }
        
        function saveToLocalStorage() {
            if (!tokens) {
                alert('Please login first!');
                return;
            }
            
            // Save tokens to localStorage (for port 3001)
            localStorage.setItem('access_token', tokens.accessToken);
            localStorage.setItem('refresh_token', tokens.refreshToken);
            
            // Also save auth session
            const authSession = {
                user: {
                    id: 'admin',
                    email: 'admin@patentpro.com',
                    firstName: 'System',
                    lastName: 'Administrator',
                    role: 'admin',
                    organizationId: null,
                    permissions: []
                },
                tokens: tokens,
                sessionId: 'admin-session',
                expiresAt: new Date(Date.now() + 3600000).toISOString()
            };
            localStorage.setItem('auth_session', JSON.stringify(authSession));
            
            document.getElementById('result').innerHTML += `
                <hr>
                <p style="color: green;"><strong>✓ Tokens saved to localStorage!</strong></p>
                <p>You can now navigate to: <a href="http://192.168.29.81:3001/dashboard/workflows/templates" target="_blank">Workflow Templates</a></p>
            `;
        }
    </script>
</body>
</html>
