services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.patpipes.com/api/v1}
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.patpipes.com/api/v1}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-https://api.patpipes.com}
      PORT: 3001
    ports:
      - "3001:3001"
